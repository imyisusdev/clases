<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ideas JS: Color de Fondo Aleatorio - imyisusdev</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Outfit', sans-serif;
      background-color: #f1f5f9;
      color: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      transition: background-color 0.4s ease; /* Transición suave */
    }
    .card {
      background-color: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      max-width: 360px;
      width: 100%;
      padding: 30px;
      border: 4px solid #000000;
      box-shadow: 8px 8px 0px #000000;
      border-radius: 20px;
      text-align: center;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: -0.5px;
    }
    .color-info {
      font-size: 1.25rem;
      font-weight: 800;
      background-color: #ffffff;
      border: 3px solid #000000;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 25px;
      display: block;
      box-shadow: 4px 4px 0px #000000;
    }
    button {
      width: 100%;
      padding: 15px;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      border: 3px solid #000000;
      border-radius: 10px;
      background-color: #a8e6cf;
      color: #000000;
      box-shadow: 4px 4px 0px #000000;
      transition: all 0.15s ease-in-out;
    }
    button:hover {
      background-color: #8be0c2;
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px #000000;
    }
    .back-link {
      display: block;
      margin-top: 25px;
      font-size: 0.85rem;
      color: #475569;
      text-decoration: none;
      font-weight: 600;
    }
    .back-link:hover {
      color: #000000;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Color Aleatorio</h1>
    <div class="color-info" id="color-hex">#F1F5F9</div>
    <button id="btn-change-color">🎨 ¡Cambiar Color!</button>
    <a href="../../demo/neobrutalista/index.html" class="back-link">&larr; Volver a la Bio Card</a>
  </div>

  <script>
    // Selección de elementos del DOM
    const btnChange = document.getElementById('btn-change-color');
    const colorHex = document.getElementById('color-hex');

    // Función para generar un color hex aleatorio
    function getRandomColor() {
      // Los caracteres posibles en un código hexadecimal
      const letters = '0123456789ABCDEF';
      let color = '#';
      for (let i = 0; i < 6; i++) {
        color += letters[Math.floor(Math.random() * 16)];
      }
      return color;
    }

    // Escuchador de eventos para el botón
    btnChange.addEventListener('click', () => {
      const newColor = getRandomColor();
      
      // Cambiamos el color de fondo del body
      document.body.style.backgroundColor = newColor;
      
      // Mostramos el código hexadecimal en el card
      colorHex.textContent = newColor;
    });
  </script>
</body>
</html>
