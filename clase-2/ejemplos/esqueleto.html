<!DOCTYPE html>
<!-- 
  ¡Bienvenidos a tu primer archivo HTML completo! 
  Este archivo es el "plano" de tu casa digital. 
  Aquí vamos a construir el esqueleto de tu tarjeta de presentación (Bio Card).
-->
<html lang="es">
  <head>
    <!-- El <head> es el cerebro de la página. Contiene información invisible pero crucial para el navegador. -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Bio Card Interactiva</title>
    
    <!-- Aquí colocaremos estilos CSS en la Clase 3, por ahora se verá "crudo" -->
  </head>
  <body>
    <!-- El <body> es el cuerpo de la página. Todo lo que escribas aquí adentro será visible para tus usuarios. -->

    <!-- ========================================== -->
    <!-- 🏠 1. CABECERA: Tu presentación principal   -->
    <!-- ========================================== -->
    <!-- 
      Usa la etiqueta semántica <header> (de "head" = cabeza).
      Aquí va tu foto y tu nombre principal.
    -->
    <header>
      <!-- 
        Desafío 1: Colocá tu foto de perfil aquí usando la etiqueta <img> (de "image").
        Recordá ponerle un atributo "src" con la URL de tu imagen y un "alt" con tu nombre.
      -->
      
      <!-- 
        Desafío 2: Escribí tu nombre principal usando un título <h1> (de "heading 1").
        Es el título más importante de tu página.
      -->
      
    </header>

    <!-- ========================================== -->
    <!-- 📄 2. CONTENIDO PRINCIPAL: Tu Biografía     -->
    <!-- ========================================== -->
    <!-- 
      Usa la etiqueta semántica <main> (de "main" = principal).
      Aquí describiremos quién sos y qué hacés de manera organizada.
    -->
    <main>
      <!-- 
        Usa <article> (de "articulo" / sección independiente) para agrupar tu bío.
      -->
      <article>
        <!-- 
          Desafío 3: Colocá un subtítulo con tu rol (ej: "Desarrollador Web Novato") usando <h2>.
        -->
        
        <!-- 
          Desafío 4: Escribí un párrafo breve sobre vos usando la etiqueta <p> (de "paragraph").
          Podés usar <strong> para resaltar palabras clave (en negrita) y <em> para dar énfasis (cursiva).
        -->
        
      </article>
    </main>

    <!-- ========================================== -->
    <!-- 🔗 3. REDES SOCIALES: Enlaces de contacto   -->
    <!-- ========================================== -->
    <!-- 
      Usa una sección o div para agrupar tus redes.
      Aquí irán los enlaces que conectarán al usuario con tu mundo digital.
    -->
    <section>
      <!-- 
        Desafío 5: Agregá tus redes usando la etiqueta <a> (de "anchor" = ancla).
        Usa el atributo "href" para poner la dirección web y el atributo "target" 
        para que se abra en otra pestaña del navegador.
        
        Ejemplo de formato:
        <a href="https://github.com/tu-usuario" target="_blank">Mi GitHub</a>
      -->
      
    </section>

    <!-- ========================================== -->
    <!-- 🦶 4. PIE DE PÁGINA: Derechos y autoría     -->
    <!-- ========================================== -->
    <!-- 
      Usa la etiqueta semántica <footer> (de "foot" = pie).
      Va al final de la página y contiene créditos sencillos.
    -->
    <footer>
      <!-- 
        Desafío 6: Escribí una frase de cierre con tu nombre (ej: "Creado con pasión por TuNombre") usando un <p>.
      -->
      
    </footer>

  </body>
</html>
